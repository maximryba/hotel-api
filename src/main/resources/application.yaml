spring:
  datasource:
    url: jdbc:h2:mem:hoteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
    h2:
      console:
        enabled: true
        path: /h2-console
    liquibase:
      change-log: classpath:db/changelog/db.changelog-master.yaml
      enabled: true
  application:
    name: hotel-api

server:
  port: 8092
