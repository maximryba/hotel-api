databaseChangeLog:
  - changeSet:
      id: 002-create-contacts-table
      author: your-name
      changes:
        - createTable:
            tableName: contacts
            remarks: Таблица контактной информации отелей
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Уникальный идентификатор контактов
              - column:
                  name: phone
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: Номер телефона
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: Email адрес

        - createSequence:
            sequenceName: contacts_seq
            startValue: 1
            incrementBy: 1