databaseChangeLog:
  - changeSet:
      id: 005-create-amenities-table
      author: your-name
      changes:
        - createTable:
            tableName: amenities
            remarks: Справочник удобств
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Уникальный идентификатор удобства
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    unique: true
                    nullable: false
                  remarks: Название удобства
              - column:
                  name: description
                  type: VARCHAR(500)
                  remarks: Описание удобства

        - createSequence:
            sequenceName: amenities_seq
            startValue: 1
            incrementBy: 1