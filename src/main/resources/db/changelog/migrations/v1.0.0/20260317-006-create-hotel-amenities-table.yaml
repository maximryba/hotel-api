databaseChangeLog:
  - changeSet:
      id: 006-create-hotel-amenities-table
      author: your-name
      changes:
        - createTable:
            tableName: hotel_amenities
            remarks: Связь отелей с удобствами
            columns:
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_hotel_amenities_hotel
                    references: hotels(id)
                    nullable: false
                  remarks: Идентификатор отеля
              - column:
                  name: amenity_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_hotel_amenities_amenity
                    references: amenities(id)
                    nullable: false
                  remarks: Идентификатор удобства

        - addPrimaryKey:
            tableName: hotel_amenities
            columnNames: hotel_id, amenity_id
            constraintName: pk_hotel_amenities

        - createIndex:
            tableName: hotel_amenities
            indexName: idx_hotel_amenities_hotel
            columns:
              - column:
                  name: hotel_id

        - createIndex:
            tableName: hotel_amenities
            indexName: idx_hotel_amenities_amenity
            columns:
              - column:
                  name: amenity_id