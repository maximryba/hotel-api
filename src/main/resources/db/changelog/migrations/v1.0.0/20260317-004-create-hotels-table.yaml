databaseChangeLog:
  - changeSet:
      id: 004-create-hotels-table
      author: your-name
      changes:
        - createTable:
            tableName: hotels
            remarks: Основная таблица отелей
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Уникальный идентификатор отеля
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: Название отеля
              - column:
                  name: description
                  type: CLOB
                  remarks: Описание отеля
              - column:
                  name: brand
                  type: VARCHAR(100)
                  remarks: Бренд отеля
              - column:
                  name: address_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_hotels_address
                    references: addresses(id)
                    nullable: false
                  remarks: Ссылка на адрес
              - column:
                  name: contacts_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_hotels_contacts
                    references: contacts(id)
                    nullable: false
                  remarks: Ссылка на контакты
              - column:
                  name: arrival_time_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_hotels_arrival_time
                    references: arrival_times(id)
                    nullable: false
                  remarks: Ссылка на время заезда/выезда

        - createSequence:
            sequenceName: hotels_seq
            startValue: 1
            incrementBy: 1

        - createIndex:
            tableName: hotels
            indexName: idx_hotels_name
            columns:
              - column:
                  name: name

        - createIndex:
            tableName: hotels
            indexName: idx_hotels_brand
            columns:
              - column:
                  name: brand