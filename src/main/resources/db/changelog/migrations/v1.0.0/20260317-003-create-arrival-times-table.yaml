databaseChangeLog:
  - changeSet:
      id: 003-create-arrival-times-table
      author: your-name
      changes:
        - createTable:
            tableName: arrival_times
            remarks: Таблица времени заезда и выезда
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Уникальный идентификатор времени
              - column:
                  name: check_in
                  type: TIME
                  constraints:
                    nullable: false
                  remarks: Время заезда
              - column:
                  name: check_out
                  type: TIME
                  constraints:
                    nullable: false
                  remarks: Время выезда

        - createSequence:
            sequenceName: arrival_times_seq
            startValue: 1
            incrementBy: 1